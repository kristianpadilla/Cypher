<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cypher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020408; overflow: hidden; display: flex; height: 100vh; font-family: monospace; }

    #scene-container { flex: 1; position: relative; }
    #three-canvas { display: block; width: 100%; height: 100%; }

    #hud-top {
      position: absolute; top: 12px; left: 12px;
      color: rgba(255,70,170,0.4); font-size: 9px; letter-spacing: 0.1em;
    }
    #hud-bottom {
      position: absolute; bottom: 12px; left: 12px;
      color: rgba(0,200,255,0.3); font-size: 8px;
    }
    #status-indicator {
      position: absolute; top: 12px; right: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    #status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,70,170,0.4);
      transition: background 0.3s;
    }
    #status-label { color: rgba(0,200,255,0.35); font-size: 8px; letter-spacing: 0.1em; }

    #terminal {
      width: 220px;
      background: #030610;
      border-left: 1px solid rgba(255,60,180,0.12);
      display: flex; flex-direction: column;
    }
    #terminal-header {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,60,180,0.1);
    }
    #terminal-header .t1 { color: rgba(255,60,180,0.5); font-size: 8px; letter-spacing: 0.12em; }
    #terminal-header .t2 { color: rgba(0,200,255,0.3); font-size: 7px; margin-top: 3px; }
    #log {
      flex: 1; padding: 10px 12px;
      display: flex; flex-direction: column;
      gap: 8px; justify-content: flex-end;
      overflow: hidden;
    }
    .log-entry { font-size: 8px; line-height: 1.6; word-break: break-word; }
    .log-sys { color: rgba(255,80,180,0.45); }
    .log-usr { color: rgba(0,200,255,0.6); }
    .log-cyp { color: rgba(255,190,225,0.92); }
    #terminal-footer {
      padding: 8px 12px;
      border-top: 1px solid rgba(255,60,180,0.08);
      display: flex; align-items: center; gap: 6px;
    }
    #term-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,60,180,0.35);
      transition: background 0.3s;
    }
    #term-status { color: rgba(0,200,255,0.3); font-size: 7px; letter-spacing: 0.08em; }
  </style>
</head>
<body>

<div id="scene-container">
  <canvas id="three-canvas"></canvas>
  <div id="hud-top">CYPHER.CONSTRUCT // BLACKWALL INTERFACE</div>
  <div id="hud-bottom">IDLE</div>
  <div id="status-indicator">
    <div id="status-dot"></div>
    <div id="status-label">STANDING BY</div>
  </div>
</div>

<div id="terminal">
  <div id="terminal-header">
    <div class="t1">CYPHER // NET TERMINAL</div>
    <div class="t2">CONSTRUCT ACTIVE</div>
  </div>
  <div id="log"></div>
  <div id="terminal-footer">
    <div id="term-dot"></div>
    <div id="term-status">STANDING BY</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<script>
// ─── THREE.JS SCENE ───
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
camera.position.set(0, 0, 3);

function resizeRenderer() {
  const container = document.getElementById('scene-container');
  const w = container.clientWidth, h = container.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resizeRenderer();
window.addEventListener('resize', resizeRenderer);

const PARTICLE_COUNT = 3000;
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);

const pink = new THREE.Color(1.0, 0.27, 0.67);
const cyan = new THREE.Color(0.0, 0.82, 1.0);
const white = new THREE.Color(1.0, 0.78, 0.9);

function inFigure(x, y) {
  const regions = [
    {cx:0,   cy:1.45, rx:0.18, ry:0.18},
    {cx:0,   cy:1.27, rx:0.08, ry:0.08},
    {cx:0,   cy:1.1,  rx:0.22, ry:0.18},
    {cx:0,   cy:0.88, rx:0.18, ry:0.22},
    {cx:0,   cy:0.62, rx:0.13, ry:0.16},
    {cx:0,   cy:0.42, rx:0.16, ry:0.14},
    {cx:-0.1,cy:0.18, rx:0.09, ry:0.22},
    {cx:0.1, cy:0.18, rx:0.09, ry:0.22},
    {cx:-0.1,cy:-0.18,rx:0.07, ry:0.22},
    {cx:0.1, cy:-0.18,rx:0.07, ry:0.22},
    {cx:-0.1,cy:-0.48,rx:0.06, ry:0.1},
    {cx:0.1, cy:-0.48,rx:0.06, ry:0.1},
    {cx:-0.32,cy:1.05,rx:0.07, ry:0.18},
    {cx:0.32, cy:1.05,rx:0.07, ry:0.18},
    {cx:-0.34,cy:0.78,rx:0.06, ry:0.16},
    {cx:0.34, cy:0.78,rx:0.06, ry:0.16},
  ];
  for(const r of regions) {
    const dx = (x - r.cx) / r.rx;
    const dy = (y - r.cy) / r.ry;
    if(dx*dx + dy*dy <= 1) return true;
  }
  return false;
}

let filled = 0, attempts = 0;
while(filled < PARTICLE_COUNT && attempts < 200000) {
  attempts++;
  const x = (Math.random() - 0.5) * 1.2;
  const y = (Math.random() - 0.5) * 2.4 + 0.5;
  if(inFigure(x, y)) {
    positions[filled*3]   = x + (Math.random()-0.5)*0.015;
    positions[filled*3+1] = y + (Math.random()-0.5)*0.015;
    positions[filled*3+2] = (Math.random()-0.5)*0.08;
    const r = Math.random();
    const col = r > 0.85 ? cyan : r > 0.72 ? white : pink;
    colors[filled*3] = col.r; colors[filled*3+1] = col.g; colors[filled*3+2] = col.b;
    sizes[filled] = Math.random() * 3 + 1;
    filled++;
  }
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
const mat = new THREE.PointsMaterial({ size: 0.025, vertexColors: true, transparent: true, opacity: 0.88, sizeAttenuation: true });
const figure = new THREE.Points(geo, mat);
scene.add(figure);

const orbitGeo = new THREE.BufferGeometry();
const orbitPos = new Float32Array(80*3), orbitCol = new Float32Array(80*3);
for(let i=0;i<80;i++){
  const angle=(i/80)*Math.PI*2, r=0.7+Math.random()*0.4;
  orbitPos[i*3]=Math.cos(angle)*r; orbitPos[i*3+1]=(Math.random()-0.5)*1.8+0.5; orbitPos[i*3+2]=Math.sin(angle)*r*0.3;
  const c=Math.random()>0.5?cyan:pink;
  orbitCol[i*3]=c.r; orbitCol[i*3+1]=c.g; orbitCol[i*3+2]=c.b;
}
orbitGeo.setAttribute('position',new THREE.BufferAttribute(orbitPos,3));
orbitGeo.setAttribute('color',new THREE.BufferAttribute(orbitCol,3));
const orbitMat=new THREE.PointsMaterial({size:0.04,vertexColors:true,transparent:true,opacity:0.5});
const orbit=new THREE.Points(orbitGeo,orbitMat);
scene.add(orbit);

const rainGeo=new THREE.BufferGeometry();
const rainPos=new Float32Array(200*3),rainVel=new Float32Array(200);
for(let i=0;i<200;i++){
  rainPos[i*3]=(Math.random()-0.5)*6; rainPos[i*3+1]=(Math.random()-0.5)*6; rainPos[i*3+2]=-1+Math.random()*0.5;
  rainVel[i]=Math.random()*0.02+0.005;
}
rainGeo.setAttribute('position',new THREE.BufferAttribute(rainPos,3));
const rainMat=new THREE.PointsMaterial({size:0.02,color:new THREE.Color(0,0.7,1),transparent:true,opacity:0.2});
const rain=new THREE.Points(rainGeo,rainMat);
scene.add(rain);

let time=0, speaking=false, listening=false, thinking=false;

function animate(){
  requestAnimationFrame(animate);
  time+=0.018;

  figure.position.y=Math.sin(time*0.7)*0.06;
  orbit.rotation.y=time*0.3;

  const sp=speaking?(Math.sin(time*6)+1)/2:0;
  const lp=listening?(Math.sin(time*4)+1)/2:0;
  const tp=thinking?(Math.sin(time*2)+1)/2:0;

  mat.opacity=0.75+sp*0.2+lp*0.1;
  mat.size=0.022+sp*0.008+lp*0.004;
  orbitMat.opacity=0.3+sp*0.4+tp*0.3;
  orbit.rotation.y+=tp*0.02;

  const rp=rainGeo.attributes.position.array;
  for(let i=0;i<200;i++){
    rp[i*3+1]-=rainVel[i]*(1+sp*2);
    if(rp[i*3+1]<-3)rp[i*3+1]=3;
  }
  rainGeo.attributes.position.needsUpdate=true;
  renderer.render(scene,camera);
}
animate();

// ─── UI ELEMENTS ───
const statusDot=document.getElementById('status-dot');
const statusLabel=document.getElementById('status-label');
const termDot=document.getElementById('term-dot');
const termStatus=document.getElementById('term-status');
const hudBottom=document.getElementById('hud-bottom');
const log=document.getElementById('log');

const statusColors={
  standby:'rgba(255,70,170,0.35)',
  listening:'rgba(0,210,255,0.9)',
  thinking:'rgba(180,0,255,0.9)',
  speaking:'rgba(255,70,170,1.0)',
  muted:'rgba(80,80,80,0.6)',
};
const statusLabels={
  standby:'STANDING BY',
  listening:'LISTENING',
  thinking:'THINKING',
  speaking:'TRANSMITTING',
  muted:'MUTED',
};

let lastUserText='', lastCypherText='';

function addLog(cls,text){
  const el=document.createElement('div');
  el.className=`log-entry ${cls}`;
  el.textContent=text;
  log.appendChild(el);
  while(log.children.length>8)log.removeChild(log.firstChild);
}

function applyState(data){
  const col=statusColors[data.status]||statusColors.standby;
  const lbl=statusLabels[data.status]||'STANDING BY';
  statusDot.style.background=col;
  termDot.style.background=col;
  statusLabel.textContent=lbl;
  termStatus.textContent=lbl;
  hudBottom.textContent=data.status.toUpperCase();

  speaking=data.status==='speaking';
  listening=data.status==='listening';
  thinking=data.status==='thinking';

  if(data.user_text&&data.user_text!==lastUserText){
    lastUserText=data.user_text;
    addLog('log-usr','> '+data.user_text);
  }
  if(data.cypher_text&&data.cypher_text!==lastCypherText){
    lastCypherText=data.cypher_text;
    addLog('log-cyp',data.cypher_text);
  }
}

// ─── WEBSOCKET CONNECTION ───
const socket=io();
socket.on('connect',()=>{
  addLog('log-sys','BLACKWALL LINK ESTABLISHED');
});
socket.on('state_update',(data)=>{
  applyState(data);
});
socket.on('disconnect',()=>{
  addLog('log-sys','CONNECTION LOST');
});
</script>
</body>
</html>
